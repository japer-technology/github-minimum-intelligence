name: README Activation

on:
  pull_request:

permissions:
  contents: write

jobs:
  activate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Check and activate
        run: |
          BADGE='<img src="https://img.shields.io/badge/REMOVE_BEFORE_FLIGHT-THIS_REPO_IS_INERT-red?style=for-the-badge&amp;logo=github&amp;logoColor=white">'
          if [ -f README.md ] && (grep -qF "$BADGE" README.md || grep -q "REMOVE_BEFORE_FLIGHT-THIS_REPO_IS_INERT" README.md); then
            echo "README.md contains the inert badge — skipping activation"
            exit 0
          fi

          echo "Badge not found in README.md — activating repository"
          echo "# Activated" > ACTIVATED.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ACTIVATED.md
          git rm .github/workflows/github-minimum-intelligence-readme.yml
          git commit -m "chore: activate repository and remove activation workflow"
          git push
