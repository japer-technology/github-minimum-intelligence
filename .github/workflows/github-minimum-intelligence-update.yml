name: Update from Minimum Intelligence template

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.repository != 'japer-technology/github-minimum-intelligence'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest template
        run: |
          curl -fsSL "https://github.com/japer-technology/github-minimum-intelligence/archive/refs/heads/main.zip" \
            -o /tmp/template.zip
          unzip -q /tmp/template.zip -d /tmp/template

      - name: Update files
        run: |
          set -euo pipefail

          EXTRACTED=$(ls -d /tmp/template/github-minimum-intelligence-*)
          TARGET=".github-minimum-intelligence"

          FRESH_INSTALL="false"
          if [ ! -d "$TARGET" ]; then
            FRESH_INSTALL="true"
            echo "Fresh install detected — no existing $TARGET directory."
          fi

          INSTALLED_VERSION="unknown"
          [ -f "$TARGET/VERSION" ] && INSTALLED_VERSION=$(tr -d '[:space:]' < "$TARGET/VERSION")

          INCOMING_VERSION="unknown"
          [ -f "$EXTRACTED/$TARGET/VERSION" ] && INCOMING_VERSION=$(tr -d '[:space:]' < "$EXTRACTED/$TARGET/VERSION")

          echo "Installed version: $INSTALLED_VERSION"
          echo "Incoming version:  $INCOMING_VERSION"

          if [ "$FRESH_INSTALL" = "false" ] && [ "$INSTALLED_VERSION" = "$INCOMING_VERSION" ]; then
            echo "Already up to date (version $INSTALLED_VERSION)."
            echo "UP_TO_DATE=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "UP_TO_DATE=false" >> "$GITHUB_ENV"

          BACKUP="/tmp/backup"
          mkdir -p "$BACKUP"

          [ -f "$TARGET/AGENTS.md" ] && cp "$TARGET/AGENTS.md" "$BACKUP/AGENTS.md"
          [ -d "$TARGET/state" ] && cp -R "$TARGET/state" "$BACKUP/state"
          [ -d "$TARGET/.pi" ] && cp -R "$TARGET/.pi" "$BACKUP/.pi"

          rm -rf "$TARGET"
          cp -R "$EXTRACTED/$TARGET" "$TARGET"

          rm -rf "$TARGET/state"

          if [ "$FRESH_INSTALL" = "true" ]; then
            cp "$TARGET/install/MINIMUM-INTELLIGENCE-AGENTS.md" "$TARGET/AGENTS.md"
            mkdir -p "$TARGET/.pi"
            cp "$TARGET/install/settings.json" "$TARGET/.pi/settings.json"
          else
            [ -f "$BACKUP/AGENTS.md" ] && cp "$BACKUP/AGENTS.md" "$TARGET/AGENTS.md"
            [ -d "$BACKUP/state" ] && cp -R "$BACKUP/state" "$TARGET/state"

            if [ -d "$BACKUP/.pi" ]; then
              mkdir -p "$TARGET/.pi"
              cp -R "$BACKUP/.pi/." "$TARGET/.pi/"
            fi
          fi

          mkdir -p ".github/workflows"

          cp "$EXTRACTED/$TARGET/install/github-minimum-intelligence-agent.yml" \
            ".github/workflows/github-minimum-intelligence-agent.yml"

          if [ -f "$EXTRACTED/.github/workflows/github-minimum-intelligence-gitpage.yml" ]; then
            cp "$EXTRACTED/.github/workflows/github-minimum-intelligence-gitpage.yml" \
              ".github/workflows/github-minimum-intelligence-gitpage.yml"
          fi

          mkdir -p ".github/ISSUE_TEMPLATE"
          for tmpl in "$EXTRACTED/$TARGET/install/"github-minimum-intelligence-*.md; do
            [ -f "$tmpl" ] && cp "$tmpl" ".github/ISSUE_TEMPLATE/$(basename "$tmpl")"
          done

          echo "Updated from $INSTALLED_VERSION to $INCOMING_VERSION"

      - name: Commit and push
        if: env.UP_TO_DATE != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .github/ .github-minimum-intelligence/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update minimum-intelligence from template"
            git push
          fi
